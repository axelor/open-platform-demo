# User password policies
# ~~~~~

# Minimum password length
#user.password.length.min = 8

# Disable the login code policy
#user.password.notCode.enabled = true

# Disable the min digits policy
#user.password.digits.enabled = false
# Minimum number of digits
#user.password.digits.min = 1

# Disable the min lowercase policy
#user.password.lowerCase.enabled = false
# Minimum number of lowercase characters
#user.password.lowerCase.min = 1

# Disable the min uppercase policy
#user.password.upperCase.enabled = false
# Minimum number of uppercase characters
#user.password.upperCase.min = 1

# Disable the min special chars policy
#user.password.specialChars.enabled = false
# Minimum number of special characters
